<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邀请管理 - AutoTeam2S2A</title>
<link rel="icon" type="image/svg+xml" href="https://chatgpt.com/cdn/assets/favicon-l4nq08hd.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
  fontFamily:{sans:['DM Sans','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']},
  colors:{
    surface:{DEFAULT:'#111113',1:'#19191d',2:'#222226',3:'#2c2c31',4:'#35353b'},
    dim:{DEFAULT:'#65656d',1:'#8b8b93',2:'#adadb4'},
    amber:{400:'#fbbf24',500:'#f59e0b',600:'#d97706'},
    teal:{400:'#2dd4bf',500:'#14b8a6'},
  },
  animation:{
    'enter':'enter .5s ease-out both',
    'pulse-dot':'pulse-dot 2s cubic-bezier(0.4,0,0.6,1) infinite',
  },
  keyframes:{
    enter:{from:{opacity:'0',transform:'translateY(12px)'},to:{opacity:'1',transform:'none'}},
    'pulse-dot':{'0%,100%':{opacity:'1'},'50%':{opacity:'.4'}},
  }
}}}
</script>
<link rel="stylesheet" href="/assets/css/app.css">
</head>

<body class="min-h-screen">
<div id="toast-container"></div>

<!-- ====== Header ====== -->
<header class="sticky top-0 z-50 flex items-center justify-between px-5 py-3" style="background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--nav-border)">
  <div class="flex items-center gap-3">
    <img src="https://chatgpt.com/cdn/assets/favicon-l4nq08hd.svg" alt="Logo" class="w-7 h-7 rounded-lg shrink-0 object-contain" loading="eager" decoding="async">
    <span class="text-sm font-semibold tracking-tight c-heading">AutoTeam2S2A</span>
    <span class="text-xs font-mono px-2 py-0.5 rounded-full" style="background:var(--ghost);color:var(--text-dim)">邀请管理</span>
  </div>
  <div class="flex items-center gap-2.5">
    <a href="/" class="btn btn-ghost text-xs py-1.5 px-3 no-underline">← 返回主页</a>
    <button onclick="toggleTheme()" class="theme-toggle" title="切换主题">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
      <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
    </button>
  </div>
</header>

<!-- ====== Content ====== -->
<main class="max-w-6xl mx-auto px-5 py-5 space-y-4 animate-enter">

  <!-- 上传区域 -->
  <div class="card" style="overflow:hidden">
    <!-- 标题栏 + 模式切换 -->
    <div class="flex items-center justify-between px-5 pt-4 pb-3">
      <div class="flex items-center gap-2.5">
        <div style="width:3px;height:16px;border-radius:2px;background:linear-gradient(180deg,#14b8a6,#2dd4bf)"></div>
        <span class="section-title mb-0">导入 Owner 账号</span>
      </div>
      <div class="upload-tabs" id="upload-tabs">
        <div class="upload-tab-indicator" id="tab-indicator"></div>
        <button id="tab-file" onclick="switchInputMode('file')" class="upload-tab active" data-idx="0">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          文件
        </button>
        <button id="tab-json" onclick="switchInputMode('json')" class="upload-tab" data-idx="1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          JSON
        </button>
      </div>
    </div>

    <!-- 文件拖拽上传模式 -->
    <div id="input-mode-file" class="px-5 pb-5">
      <input type="file" id="invite-file" accept=".json,.txt" class="hidden">
      <div id="drop-zone" class="drop-zone" onclick="document.getElementById('invite-file').click()">
        <div class="drop-zone-inner">
          <div class="drop-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="drop-text">
            <span class="c-heading text-sm font-medium">拖放 JSON 文件到此处</span>
            <span class="text-dim text-xs mt-1">或点击选择文件 · 支持 .json / .txt 格式</span>
          </div>
        </div>
        <div class="drop-zone-glow"></div>
      </div>
      <div id="file-selected" class="hidden mt-3">
        <div class="flex items-center gap-3 py-2.5 px-3.5 rounded-lg" style="background:var(--ghost);border:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(20,184,166,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <div id="file-name" class="text-xs c-heading font-medium truncate"></div>
            <div id="file-size" class="text-[.65rem] text-dim font-mono mt-0.5"></div>
          </div>
          <button onclick="clearFileSelection()" class="text-dim hover:text-red-400 transition-colors p-1" title="移除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <button onclick="uploadInviteFile()" class="btn btn-teal py-2 px-5 text-xs">上传解析</button>
        </div>
      </div>
    </div>

    <!-- JSON 粘贴模式 -->
    <div id="input-mode-json" class="hidden px-5 pb-5">
      <div class="json-editor-wrap">
        <div class="json-editor-header">
          <div class="flex items-center gap-2">
            <span class="json-dot" style="background:#f87171"></span>
            <span class="json-dot" style="background:#fbbf24"></span>
            <span class="json-dot" style="background:#4ade80"></span>
            <span class="text-[.65rem] text-dim font-mono ml-1.5">accounts.json</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span id="json-char-count" class="text-[.6rem] text-dim font-mono">0 字符</span>
            <button onclick="formatJsonInput()" class="json-editor-btn" title="格式化 JSON">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </button>
            <button onclick="clearJsonInput()" class="json-editor-btn" title="清空">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <textarea id="invite-json-input" class="json-editor-textarea" rows="9" spellcheck="false" placeholder='[&#10;  {&#10;    "user": { "email": "..." },&#10;    "account": { "id": "...", "planType": "team" },&#10;    "accessToken": "...",&#10;    "expires": "2026-..."&#10;  }&#10;]'></textarea>
        <div class="json-editor-footer">
          <div class="flex items-center gap-2">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-dim"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span class="text-[.6rem] text-dim">支持单个对象或数组 · 自动提取 email / account / token</span>
          </div>
          <button onclick="uploadFromJsonInput()" class="btn btn-teal py-1.5 px-5 text-xs">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            解析并上传
          </button>
        </div>
      </div>
    </div>

    <!-- 解析预览 -->
    <div id="invite-upload-result" class="hidden" style="border-top:1px solid var(--border)">
      <div class="flex items-center justify-between px-5 py-3">
        <div class="flex items-center gap-2.5">
          <div style="width:6px;height:6px;border-radius:50%;background:#2dd4bf;box-shadow:0 0 8px rgba(45,212,191,.5)"></div>
          <span class="text-xs font-semibold c-heading">解析结果</span>
          <span id="owner-count-badge" class="text-[.6rem] font-mono px-2 py-0.5 rounded-full font-semibold" style="background:rgba(45,212,191,.1);color:#2dd4bf;border:1px solid rgba(45,212,191,.2)"></span>
        </div>
        <button onclick="document.getElementById('invite-upload-result').classList.add('hidden')" class="text-dim hover:text-white transition-colors p-0.5">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="invite-owners-preview" class="px-5 pb-4 grid gap-1.5" style="max-height:280px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- 执行配置 -->
  <div class="card p-5">
    <div class="section-title">邀请配置</div>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      <div>
        <label class="field-label">选择上传批次</label>
        <div id="inv-upload-id" class="custom-select">
          <div class="custom-select-trigger" onclick="toggleCustomSelect('inv-upload-id')">
            <span class="cs-label cs-placeholder">-- 无 --</span>
            <svg class="cs-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="custom-select-panel"></div>
        </div>
      </div>
      <div>
        <label class="field-label">每 Owner 邀请数</label>
        <input id="inv-count" type="number" min="1" max="25" value="6" class="field-input">
      </div>
      <div>
        <label class="field-label">目标号池</label>
        <select id="inv-s2a-team" class="field-input"></select>
      </div>
      <div>
        <label class="field-label">推送 S2A</label>
        <select id="inv-push-s2a" class="field-input">
          <option value="true" selected>是</option>
          <option value="false">否（仅邀请+注册）</option>
        </select>
      </div>
      <div class="flex items-end">
        <button onclick="executeInvite()" class="btn btn-amber w-full justify-center">执行邀请</button>
      </div>
    </div>
    <!-- Owner 列表 -->
    <div id="invite-owners-list" class="mt-4 hidden">
      <div class="text-xs c-dim mb-2">Owner 账号列表：</div>
      <div id="invite-owners-table" class="text-xs" style="max-height:200px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- 邀请任务列表 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-3">
      <div class="section-title mb-0">邀请任务</div>
      <button onclick="loadInviteTasks()" class="btn btn-ghost text-xs py-1 px-2">刷新</button>
    </div>
    <div id="invite-tasks-list" class="text-xs">
      <span class="text-dim">暂无邀请任务</span>
    </div>
  </div>

  <!-- 上传历史 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-3">
      <div class="section-title mb-0">上传历史</div>
      <button onclick="loadInviteUploads()" class="btn btn-ghost text-xs py-1 px-2">刷新</button>
    </div>
    <div id="invite-uploads-list" class="text-xs">
      <span class="text-dim">暂无上传记录</span>
    </div>
  </div>

  <!-- 实时日志 -->
  <div class="card p-4">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
        <div class="section-title mb-0">实时日志</div>
        <span id="log-status" class="text-[.65rem] font-mono px-2 py-0.5 rounded-full" style="background:var(--ghost);color:var(--text-dim)">未连接</span>
        <span id="log-count" class="text-[.65rem] font-mono text-dim">0 条</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleLogScroll()" id="log-scroll-btn" class="btn btn-ghost text-xs py-1 px-2">自动滚动: 开</button>
        <button onclick="clearLogs()" class="btn btn-ghost text-xs py-1 px-2">清空</button>
      </div>
    </div>
    <pre id="log-container" style="background:#0a0a0c;border:1px solid var(--border);border-radius:8px;height:360px;min-height:200px;overflow-y:auto;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;color:#c8c8d0;white-space:pre-wrap;word-break:break-all;margin:0"></pre>
  </div>

</main>

<script src="/assets/js/invite.js"></script>
</body>
</html>
