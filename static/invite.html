<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邀请管理 - AutoTeam2S2A</title>
<link rel="icon" type="image/svg+xml" href="https://chatgpt.com/cdn/assets/favicon-l4nq08hd.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
  fontFamily:{sans:['DM Sans','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']},
  colors:{
    surface:{DEFAULT:'#111113',1:'#19191d',2:'#222226',3:'#2c2c31',4:'#35353b'},
    dim:{DEFAULT:'#65656d',1:'#8b8b93',2:'#adadb4'},
    amber:{400:'#fbbf24',500:'#f59e0b',600:'#d97706'},
    teal:{400:'#2dd4bf',500:'#14b8a6'},
  },
  animation:{
    'enter':'enter .5s ease-out both',
    'pulse-dot':'pulse-dot 2s cubic-bezier(0.4,0,0.6,1) infinite',
  },
  keyframes:{
    enter:{from:{opacity:'0',transform:'translateY(12px)'},to:{opacity:'1',transform:'none'}},
    'pulse-dot':{'0%,100%':{opacity:'1'},'50%':{opacity:'.4'}},
  }
}}}
</script>
<link rel="stylesheet" href="/assets/css/app.css">
</head>

<body class="min-h-screen">
<div id="toast-container"></div>

<!-- ====== Header ====== -->
<header class="sticky top-0 z-50 flex items-center justify-between px-5 py-3" style="background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--nav-border)">
  <div class="flex items-center gap-3">
    <img src="https://chatgpt.com/cdn/assets/favicon-l4nq08hd.svg" alt="Logo" class="w-7 h-7 rounded-lg shrink-0 object-contain" loading="eager" decoding="async">
    <span class="text-sm font-semibold tracking-tight c-heading">AutoTeam2S2A</span>
    <span class="text-xs font-mono px-2 py-0.5 rounded-full" style="background:var(--ghost);color:var(--text-dim)">邀请管理</span>
  </div>
  <div class="flex items-center gap-2.5">
    <a href="/" class="btn btn-ghost text-xs py-1.5 px-3 no-underline">← 返回主页</a>
    <button onclick="toggleTheme()" class="theme-toggle" title="切换主题">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
      <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
    </button>
  </div>
</header>

<!-- ====== Content ====== -->
<main class="max-w-6xl mx-auto px-5 py-5 space-y-4 animate-enter">

  <!-- 上传区域 -->
  <div class="card p-5">
    <div class="section-title">上传 Team Owner 账号</div>
    <div class="flex items-end gap-3">
      <div class="flex-1">
        <label class="field-label">选择 JSON 文件</label>
        <input type="file" id="invite-file" accept=".json" class="field-input text-xs" style="padding:8px">
      </div>
      <button onclick="uploadInviteFile()" class="btn btn-teal py-2.5 px-6">上传</button>
    </div>
    <div id="invite-upload-result" class="mt-3 hidden">
      <div class="text-xs c-dim mb-2">解析结果：</div>
      <div id="invite-owners-preview" class="text-xs" style="max-height:160px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- 执行配置 -->
  <div class="card p-5">
    <div class="section-title">邀请配置</div>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      <div>
        <label class="field-label">选择上传批次</label>
        <select id="inv-upload-id" class="field-input" onchange="loadInviteUploadDetail()"></select>
      </div>
      <div>
        <label class="field-label">每 Owner 邀请数</label>
        <input id="inv-count" type="number" min="1" max="25" value="6" class="field-input">
      </div>
      <div>
        <label class="field-label">目标号池</label>
        <select id="inv-s2a-team" class="field-input"></select>
      </div>
      <div>
        <label class="field-label">推送 S2A</label>
        <select id="inv-push-s2a" class="field-input">
          <option value="true" selected>是</option>
          <option value="false">否（仅邀请+注册）</option>
        </select>
      </div>
      <div class="flex items-end">
        <button onclick="executeInvite()" class="btn btn-amber w-full justify-center">执行邀请</button>
      </div>
    </div>
    <!-- Owner 列表 -->
    <div id="invite-owners-list" class="mt-4 hidden">
      <div class="text-xs c-dim mb-2">Owner 账号列表：</div>
      <div id="invite-owners-table" class="text-xs" style="max-height:200px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- 邀请任务列表 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-3">
      <div class="section-title mb-0">邀请任务</div>
      <button onclick="loadInviteTasks()" class="btn btn-ghost text-xs py-1 px-2">刷新</button>
    </div>
    <div id="invite-tasks-list" class="text-xs">
      <span class="text-dim">暂无邀请任务</span>
    </div>
  </div>

  <!-- 上传历史 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-3">
      <div class="section-title mb-0">上传历史</div>
      <button onclick="loadInviteUploads()" class="btn btn-ghost text-xs py-1 px-2">刷新</button>
    </div>
    <div id="invite-uploads-list" class="text-xs">
      <span class="text-dim">暂无上传记录</span>
    </div>
  </div>

  <!-- 实时日志 -->
  <div class="card p-4">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
        <div class="section-title mb-0">实时日志</div>
        <span id="log-status" class="text-[.65rem] font-mono px-2 py-0.5 rounded-full" style="background:var(--ghost);color:var(--text-dim)">未连接</span>
        <span id="log-count" class="text-[.65rem] font-mono text-dim">0 条</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleLogScroll()" id="log-scroll-btn" class="btn btn-ghost text-xs py-1 px-2">自动滚动: 开</button>
        <button onclick="clearLogs()" class="btn btn-ghost text-xs py-1 px-2">清空</button>
      </div>
    </div>
    <pre id="log-container" style="background:#0a0a0c;border:1px solid var(--border);border-radius:8px;height:360px;min-height:200px;overflow-y:auto;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;color:#c8c8d0;white-space:pre-wrap;word-break:break-all;margin:0"></pre>
  </div>

</main>

<script src="/assets/js/invite.js"></script>
</body>
</html>
